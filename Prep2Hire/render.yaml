services:
  - type: web
    name: prep2hire
    runtime: python
    rootDir: Prep2Hire
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn Prep2Hire.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: prep2hire-db
          property: connectionString
      # ── Set these manually in the Render dashboard ──
      - key: SITE_URL
        value: "https://prep2hire.onrender.com"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

databases:
  - name: prep2hire-db
    databaseName: prep2hire
    user: prep2hire
