{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>{{ problem.title }}</title>
    <style>
        body {
            font-family: 'Inter', 'Poppins', sans-serif;
            background-color: #050508;
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.1), transparent 25%), radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.1), transparent 25%);
            color: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 700px;
            width: 100%;
            height: 20%;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 30px 40px;
        }

        h3.card-title {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 20px;
            color: #f8fafc;
            font-family: 'Inter', 'Roboto', sans-serif;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
            border-bottom: 3px solid #3b82f6;
            padding-bottom: 12px;
        }

        p.card-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 30px;
            white-space: pre-wrap; 
        }

        a.btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        a.btn-primary:hover,
        a.btn-primary:focus {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
            outline: none;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h3 class="card-title">{{ problem.title }}</h3>
    <p class="card-text">{{ problem.description|linebreaks }}</p>
    <a href="{% url 'judge:submit_solution' slug=problem.slug %}" class="btn-primary">Solve Problem</a>
</div>

</body>
</html>
