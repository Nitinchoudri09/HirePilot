<!DOCTYPE html>
<html>
<head>
  <title>Career Recommendation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #050508;
      background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.1), transparent 25%), radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.1), transparent 25%);
      color: #f8fafc;
      padding: 40px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .career-container {
      background: rgba(20, 20, 30, 0.6);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 30px 40px;
      max-width: 600px;
      width: 100%;
      height: fit-content;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    h2 {
      color: #f8fafc;
      font-size: 2.2rem;
      margin-top: 0;
      margin-bottom: 15px;
      font-weight: 800;
      border-bottom: 3px solid #3b82f6;
      padding-bottom: 8px;
      text-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    h3 {
      color: #3b82f6;
      font-weight: 700;
      font-size: 1.6rem;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 18px;
      color: #cbd5e1;
    }

    strong {
      color: #f8fafc;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      text-decoration: none;
      font-weight: 700;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
    }

    @media (max-width: 600px) {
      body { padding: 16px; }
      h2 { font-size: 1.5rem; word-wrap: break-word; }
      h3 { font-size: 1.2rem; word-wrap: break-word; }
      .career-container { padding: 20px 16px; }
      p { font-size: 1rem; }
    }

    @media (max-width: 390px) {
      h2 { font-size: 1.3rem; }
      .career-container { padding: 16px 12px; border-radius: 10px; }
    }
  </style>
</head>
<body>
  <div class="career-container">
    <h2>Your Recommended Career Path:</h2>
    <h3>{{ suggestion.career }}</h3>
    <p><strong>Description:</strong> {{ suggestion.description }}</p>
    <p><strong>Skills Required:</strong> {{ suggestion.skills_required }}</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
