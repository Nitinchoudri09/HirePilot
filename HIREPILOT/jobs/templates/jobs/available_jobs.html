{% extends "navbar.html" %}
{% block title %}Available Jobs{% endblock %}
{% block content %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Available Jobs</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: var(--font, 'Inter', sans-serif);
      background-color: var(--surface-alt, #f8fafc);
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: var(--text-primary, #0f172a);
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 30px;
    }

    .jobs-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .job-card {
      background: var(--surface, #ffffff);
      border-radius: var(--radius, 12px);
      border: 1px solid var(--border, #e2e8f0);
      box-shadow: var(--shadow, 0 4px 24px rgba(0,0,0,0.08));
      padding: 24px;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      font-size: 14px;
    }

    .job-card:hover {
      box-shadow: var(--shadow-hover, 0 8px 32px rgba(79,70,229,0.15));
      transform: translateY(-2px);
    }

    .job-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary, #0f172a);
    }

    .company-name,
    .location {
      font-size: 13px;
      color: var(--text-secondary, #64748b);
      margin-top: 6px;
    }

    .show-more {
      margin-top: 10px;
      font-size: 13px;
      color: var(--primary, #4f46e5);
      cursor: pointer;
      font-weight: 600;
    }

    /* Job Details Modal */
    .modal, .success-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background-color: var(--surface, #fff);
      padding: 24px;
      width: 550px;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: var(--radius, 12px);
      border: 1px solid var(--border, #e2e8f0);
      position: relative;
      animation: fadeIn 0.3s ease;
      box-shadow: var(--shadow-hover, 0 8px 32px rgba(79,70,229,0.15));
    }

    .modal-content h2 {
      font-size: 18px;
      color: var(--text-primary, #0f172a);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .modal-content h4 {
      font-size: 14px;
      margin-top: 0;
      color: var(--text-secondary, #64748b);
    }

    .close {
      position: absolute;
      top: 12px;
      right: 18px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      color: var(--text-secondary, #64748b);
      transition: color 0.2s ease;
    }
    .close:hover {
      color: var(--text-primary, #0f172a);
    }

    .apply-btn {
      background-color: var(--primary, #4f46e5);
      color: #fff;
      padding: 10px 24px;
      border: none;
      border-radius: var(--radius-sm, 8px);
      margin-top: 16px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .apply-btn:hover {
      background-color: var(--primary-hover, #4338ca);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .success-content {
      background-color: var(--surface, #fff);
      padding: 20px 30px;
      width: 280px;
      text-align: center;
      border-radius: var(--radius, 12px);
      border: 1px solid var(--border, #e2e8f0);
      box-shadow: var(--shadow, 0 4px 24px rgba(0,0,0,0.08));
      animation: fadeIn 0.3s ease;
    }

    .success-content h2 {
      color: var(--success, #10b981);
      font-size: 16px;
      margin: 0;
      font-weight: 700;
    }

    /* Filters & Search */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      max-width: 1200px;
      margin: 0 auto 30px auto;
      background: var(--surface, white);
      padding: 20px;
      border-radius: var(--radius, 12px);
      border: 1px solid var(--border, #e2e8f0);
      box-shadow: var(--shadow, 0 4px 24px rgba(0,0,0,0.08));
    }

    .filter-bar input, .filter-bar select {
      flex: 1;
      min-width: 200px;
      padding: 10px 15px;
      border: 1px solid var(--border, #e2e8f0);
      border-radius: var(--radius-sm, 8px);
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .filter-bar input:focus, .filter-bar select:focus {
      border-color: var(--primary, #4f46e5);
      box-shadow: 0 0 0 3px var(--primary-light, #ede9fe);
      outline: none;
    }

    .filter-bar button {
      background: var(--primary, #4f46e5);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: var(--radius-sm, 8px);
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    .filter-bar button:hover {
      background: var(--primary-hover, #4338ca);
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 30px;
      margin-bottom: 50px;
    }

    .pagination button {
      background: var(--surface, white);
      border: 1px solid var(--border, #e2e8f0);
      padding: 8px 16px;
      border-radius: var(--radius-sm, 8px);
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: all 0.2s ease;
      color: var(--text-primary, #0f172a);
    }

    .pagination button:hover:not(:disabled) {
      background: var(--surface-alt, #f8fafc);
      border-color: var(--primary, #4f46e5);
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #page-indicator {
      display: flex;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary, #0f172a);
    }

    @media (max-width: 992px) {
      .jobs-container {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 16px !important;
      }
      .filter-bar {
        flex-direction: column !important;
        padding: 16px !important;
        gap: 12px !important;
      }
      .filter-bar input,
      .filter-bar select,
      .filter-bar button {
        width: 100% !important;
        min-width: 100% !important;
        min-height: 44px !important;
      }
      .jobs-container {
        grid-template-columns: 1fr !important;
        gap: 16px !important;
      }
      .job-card {
        padding: 16px !important;
      }
      .job-card button,
      .job-card .apply-btn {
        width: 100% !important;
        min-height: 44px !important;
        font-size: 14px !important;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 12px !important;
      }
      .pagination button {
        min-height: 44px !important;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px !important;
      }
      .modal-content {
        width: 90% !important;
        padding: 16px !important;
      }
    }
  </style>
</head>
<body>
  <br><br>
  <h1>Available Jobs</h1>
  
  <div class="filter-bar">
    <input type="text" id="searchRole" placeholder="Search Role (e.g. Developer)">
    <input type="text" id="searchLocation" placeholder="Location (e.g. New York)">
    <select id="searchCategory">
      <option value="">All Categories</option>
      <option value="Software Engineer">Software Engineer</option>
      <option value="Data Science">Data Science</option>
      <option value="Design">Design</option>
      <option value="Marketing">Marketing</option>
    </select>
    <button onclick="applyFilters()">Search Jobs</button>
  </div>

  <div class="jobs-container" id="jobs-container">
    <!-- Job cards will be injected here -->
  </div>

  <div class="pagination">
    <button id="prevPage" onclick="changePage(-1)" disabled>Previous</button>
    <span id="page-indicator">Page 1</span>
    <button id="nextPage" onclick="changePage(1)">Next</button>
  </div>

  <!-- Job Detail Modal -->
  <div class="modal" id="jobModal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2 id="modalTitle"></h2>
      <h4 id="modalCompany"></h4>
      <p id="modalLocation" style="color:#555;"></p>
      <hr style="margin:10px 0;">
      <div id="modalDescription" style="font-size: 13px; text-align:left;"></div>
      <button class="apply-btn" onclick="applyJob()">Apply Now</button>
    </div>
  </div>

  <!-- Applied Success Modal -->
  <div class="success-modal" id="successModal">
    <div class="success-content">
      <h2>✅ Applied Successfully!</h2>
    </div>
  </div>

  <script>
    const modal = document.getElementById('jobModal');
    const successModal = document.getElementById('successModal');

    const modalTitle = document.getElementById('modalTitle');
    const modalCompany = document.getElementById('modalCompany');
    const modalLocation = document.getElementById('modalLocation');
    const modalDescription = document.getElementById('modalDescription');
    let currentJobUrl = '';

    function openModal(job) {
      modalTitle.textContent = job.name;
      modalCompany.textContent = job.company.name;
      modalLocation.textContent = job.locations.map(loc => loc.name).join(', ');
      modalDescription.innerHTML = job.contents;
      
      // The Muse API returns URL in job.refs.landing_page
      if (job.refs && job.refs.landing_page) {
        currentJobUrl = job.refs.landing_page;
      } else {
        currentJobUrl = '';
      }
      
      modal.style.display = 'flex';
    }

    function closeModal() {
      modal.style.display = 'none';
    }

    function applyJob() {
      if (currentJobUrl) {
        window.open(currentJobUrl, '_blank');
      } else {
        modal.style.display = 'none';
        successModal.style.display = 'flex';
        setTimeout(() => {
          successModal.style.display = 'none';
        }, 1800);
      }
    }

    let currentPage = 1;
    let currentFilters = '';

    function fetchJobs() {
      const container = document.getElementById('jobs-container');
      container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Loading jobs...</p>';
      
      let API_URL = `https://www.themuse.com/api/public/jobs?page=${currentPage}${currentFilters}`;

      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          container.innerHTML = '';
          if (!data.results || data.results.length === 0) {
            if (currentFilters) {
              container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #555;">No jobs found matching your criteria. Try adjusting your filters.</p>';
            } else {
              container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #555;">No jobs currently available.</p>';
            }
            return;
          }
          
          data.results.forEach(job => {
            const card = document.createElement('div');
            card.className = 'job-card';
            card.innerHTML = `
              <div class="job-title">${job.name}</div>
              <div class="company-name">${job.company.name}</div>
              <div class="location">${job.locations.map(loc => loc.name).join(', ')}</div>
              <div class="show-more">Show Details</div>
            `;
            card.querySelector('.show-more').addEventListener('click', () => {
              openModal(job);
            });
            container.appendChild(card);
          });

          document.getElementById('page-indicator').textContent = `Page ${currentPage}`;
          document.getElementById('prevPage').disabled = currentPage === 1;
        })
        .catch(err => {
          container.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>Failed to load jobs. Please try again later.</p>";
          console.error(err);
        });
    }

    function applyFilters() {
      const role = document.getElementById('searchRole').value;
      const location = document.getElementById('searchLocation').value;
      const category = document.getElementById('searchCategory').value;
      
      currentFilters = '';
      if (role) currentFilters += `&level=${encodeURIComponent(role)}`;
      if (location) currentFilters += `&location=${encodeURIComponent(location)}`;
      if (category) currentFilters += `&category=${encodeURIComponent(category)}`;
      
      currentPage = 1;
      fetchJobs();
    }

    function changePage(delta) {
      currentPage += delta;
      if (currentPage < 1) currentPage = 1;
      fetchJobs();
    }

    // Initial load
    fetchJobs();

    // Dismiss modals on background click
    window.onclick = function (e) {
      if (e.target == modal) modal.style.display = "none";
      if (e.target == successModal) successModal.style.display = "none";
    };
  </script>
</body>
</html>
{% endblock %}
