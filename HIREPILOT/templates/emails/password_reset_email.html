<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; background: #f4f4f4; padding: 30px;">
  <div style="max-width: 500px; margin: auto; background: white; border-radius: 10px; padding: 30px;">
    <h2 style="color: #4f46e5;">Reset Your Password 🔐</h2>
    <p>Hi {{ user.first_name }},</p>
    <p>We received a request to reset your HirePilot password. Click the button below to choose a new one.</p>
    <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
       style="display:inline-block; background:#4f46e5; color:white; padding:12px 24px;
              border-radius:6px; text-decoration:none; margin-top:16px;">
      Reset My Password
    </a>
    <p style="margin-top:24px; color:#888; font-size:12px;">
      This link expires in 1 hour. If you didn't request a reset, ignore this email — your password won't change.
    </p>
  </div>
</body>
</html>
