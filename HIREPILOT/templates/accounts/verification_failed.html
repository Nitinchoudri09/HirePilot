{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Failed — HirePilot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-dark: #050816;
      --primary: #3B82F6;
      --purple: #8B5CF6;
      --indigo: #4F46E5;
      --red: #EF4444;
      --text-white: #F8FAFC;
      --text-muted: #94a3b8;
      --glass-bg: rgba(20, 20, 30, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 15% 25%, rgba(139, 92, 246, 0.15), transparent 40%), 
        radial-gradient(circle at 75% 75%, rgba(59, 130, 246, 0.15), transparent 40%);
      color: var(--text-white);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .auth-card {
      width: 100%;
      max-width: 480px;
      padding: 3rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      text-align: center;
    }
    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-white);
      letter-spacing: -0.5px;
      text-decoration: none;
      margin-bottom: 2rem;
    }
    .brand-logo img {
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 0 8px rgba(59,130,246,0.6));
    }
    .icon-wrapper {
      width: 80px;
      height: 80px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      color: var(--red);
    }
    .icon-wrapper svg {
      width: 40px;
      height: 40px;
    }
    h2 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff, #fca5a5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--indigo), var(--purple));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <a href="/" class="brand-logo">
      <img src="{% static 'assets/images/hirepilot_logo.png' %}" alt="Logo">
      HirePilot
    </a>
    <div class="icon-wrapper">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>
    <h2>Verification Failed</h2>
    
    <p>
      {% if error == 'expired' %}
        This verification link has expired (links are valid for 24 hours). Please sign up again.
      {% else %}
        This verification link is invalid or already used.
      {% endif %}
    </p>
    
    <a href="/signup/" class="btn">Sign Up Again</a>
  </div>
</body>
</html>
